name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # Generate gradle wrapper dynamically since it's missing locally
    - name: Generate Gradle Wrapper
      working-directory: ./android_client
      run: gradle wrapper --gradle-version 8.1.1

    - name: Grant execute permission for gradlew
      working-directory: ./android_client
      run: chmod +x gradlew

    - name: Build Debug APK
      working-directory: ./android_client
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OBS_Virtual_Camera_APK
        path: android_client/app/build/outputs/apk/debug/app-debug.apk
